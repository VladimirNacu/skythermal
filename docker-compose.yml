services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://pip:pip@postgres:5432/pip
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: pip
      POSTGRES_USER: pip
      POSTGRES_PASSWORD: pip
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  pgdata:
  frontend_node_modules:
