server {
    server_name skythermal.club;

    root /opt/skythermal/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(v1|docs|openapi\.json|redoc) {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/skythermal.club/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/skythermal.club/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = skythermal.club) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name skythermal.club;
    return 404; # managed by Certbot
}
